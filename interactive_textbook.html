<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-1 空間中的線、平面與形體 - 數位互動教室</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --textbook-blue: #2563eb;
            --textbook-orange: #f59e0b;
            --textbook-green: #10b981;
            --textbook-bg: #f8fafc;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--textbook-bg);
            overflow: hidden;
            /* Prevent page scroll, use slide transitions */
        }

        h1,
        h2,
        h3,
        .font-serif {
            font-family: 'Noto Serif TC', serif;
        }

        .slide-enter {
            animation: slideIn 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-exit {
            animation: slideOut 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(-50px);
            }
        }

        .textbook-panel {
            position: relative;
        }

        .textbook-panel::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--textbook-blue);
            border-radius: 4px 0 0 4px;
        }

        /* Common reusable components from index.html */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--textbook-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Three.js Viewer Component ---
        const ThreeDViewer = ({ sides, height, isSpinning = true }) => {
            const containerRef = useRef(null);
            const meshRef = useRef(null);
            const topFaceRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.appendChild(renderer.domElement);

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(10, 10, 10);
                scene.add(pointLight);

                // Geometry creation
                const radius = 2.5;
                const h = height / 20; // Scale height for display

                const group = new THREE.Group();
                scene.add(group);
                meshRef.current = group;

                const updateGeometry = () => {
                    group.clear();

                    const actualH = height / 20;
                    // Cylinder for the swept volume
                    const geom = new THREE.CylinderGeometry(radius, radius, actualH, sides, 1, false);
                    const mat = new THREE.MeshPhongMaterial({
                        color: 0xf97316,
                        transparent: true,
                        opacity: 0.6,
                        side: THREE.DoubleSide,
                        flatShading: true
                    });
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.y = actualH / 2;
                    group.add(mesh);

                    // Top Face (solid orange)
                    const topGeom = new THREE.CircleGeometry(radius, sides);
                    const topMat = new THREE.MeshPhongMaterial({ color: 0xf97316, side: THREE.DoubleSide });
                    const topFace = new THREE.Mesh(topGeom, topMat);
                    topFace.rotation.x = -Math.PI / 2;
                    topFace.rotation.z = Math.PI / 2; // Align with CylinderGeometry vertices
                    topFace.position.y = actualH;
                    group.add(topFace);

                    // Bottom Face (faint indicator)
                    const botGeom = new THREE.CircleGeometry(radius, sides);
                    const botMat = new THREE.MeshPhongMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.3 });
                    const botFace = new THREE.Mesh(botGeom, botMat);
                    botFace.rotation.x = Math.PI / 2;
                    botFace.rotation.z = -Math.PI / 2; // Align with CylinderGeometry vertices
                    group.add(botFace);

                    // Edges
                    const edges = new THREE.EdgesGeometry(geom);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xea580c, linewidth: 2 }));
                    line.position.y = actualH / 2;
                    group.add(line);
                };

                updateGeometry();

                camera.position.set(6, 6, 8);
                camera.lookAt(0, 1, 0);

                let frameId;
                const animate = () => {
                    if (isSpinning && group) {
                        group.rotation.y += 0.01;
                    }
                    renderer.render(scene, camera);
                    frameId = requestAnimationFrame(animate);
                };
                animate();

                // Mouse interaction
                let isDragging = false;
                let prevMouse = { x: 0, y: 0 };
                const onDown = (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
                const onMove = (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - prevMouse.x;
                    const dy = e.clientY - prevMouse.y;
                    group.rotation.y += dx * 0.01;
                    group.rotation.x += dy * 0.01;
                    prevMouse = { x: e.clientX, y: e.clientY };
                };
                const onUp = () => { isDragging = false; };

                containerRef.current.addEventListener('pointerdown', onDown);
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);

                return () => {
                    cancelAnimationFrame(frameId);
                    if (containerRef.current && renderer.domElement) {
                        containerRef.current.removeChild(renderer.domElement);
                    }
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
            }, [sides, height, isSpinning]);

            return (
                <div className="relative w-full h-[400px] bg-slate-50 border-2 border-slate-200 rounded-3xl overflow-hidden cursor-grab active:cursor-grabbing shadow-inner backdrop-blur-sm">
                    <div className="absolute top-4 left-4 flex flex-col gap-1 z-10">
                        <span className="bg-orange-600 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter shadow-md">
                            <i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Three.js 實時渲染
                        </span>
                        <span className="text-slate-600 text-xs font-bold bg-white/80 px-2 py-0.5 rounded backdrop-blur-sm mt-1">
                            {sides > 20 ? '圓柱趨近演示' : `正 ${sides} 角柱生成`}
                        </span>
                    </div>
                    <div ref={containerRef} className="w-full h-full" />
                </div>
            );
        };

        // --- Three.js Skew Viewer ---
        const SkewViewer = ({ targetEdge, isSpinning = true }) => {
            const containerRef = useRef(null);
            const groupRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(10, 10, 10);
                scene.add(pointLight);

                const group = new THREE.Group();
                scene.add(group);
                groupRef.current = group;

                // Cube
                const size = 3;
                const geom = new THREE.BoxGeometry(size, size, size);
                const mat = new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
                const cube = new THREE.Mesh(geom, mat);
                group.add(cube);

                // Edges (Base)
                const edgesGeom = new THREE.EdgesGeometry(geom);
                const baseEdges = new THREE.LineSegments(edgesGeom, new THREE.LineBasicMaterial({ color: 0x475569, linewidth: 1 }));
                group.add(baseEdges);

                // Vertices Labels (simplified as small spheres)
                const vGeom = new THREE.SphereGeometry(0.1, 8, 8);
                const vMat = new THREE.MeshBasicMaterial({ color: 0x94a3b8 });
                const vPos = [
                    [-size / 2, size / 2, size / 2], [size / 2, size / 2, size / 2], [size / 2, -size / 2, size / 2], [-size / 2, -size / 2, size / 2],
                    [-size / 2, size / 2, -size / 2], [size / 2, size / 2, -size / 2], [size / 2, -size / 2, -size / 2], [-size / 2, -size / 2, -size / 2]
                ];
                vPos.forEach(p => {
                    const v = new THREE.Mesh(vGeom, vMat);
                    v.position.set(...p);
                    group.add(v);
                });

                // Highlighted Edges
                const addEdge = (p1, p2, color, thickness = 4) => {
                    const points = [new THREE.Vector3(...p1), new THREE.Vector3(...p2)];
                    const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color, linewidth: thickness }));
                    group.add(line);
                };

                // Reference Edge AB (Top Front)
                addEdge([-size / 2, size / 2, size / 2], [size / 2, size / 2, size / 2], 0xf97316); // Orange

                // Target Edge
                if (targetEdge === 'CG') {
                    addEdge([-size / 2, -size / 2, size / 2], [-size / 2, -size / 2, -size / 2], 0x10b981); // Green Skew
                } else if (targetEdge === 'BC') {
                    addEdge([size / 2, size / 2, size / 2], [size / 2, -size / 2, size / 2], 0xf43f5e); // Red Intersecting
                }

                camera.position.set(5, 5, 8);
                camera.lookAt(0, 0, 0);

                let frameId;
                const animate = () => {
                    if (isSpinning) group.rotation.y += 0.005;
                    renderer.render(scene, camera);
                    frameId = requestAnimationFrame(animate);
                };
                animate();

                // Interactivity
                let isDragging = false;
                let prevMouse = { x: 0, y: 0 };
                const onDown = (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
                const onMove = (e) => {
                    if (!isDragging) return;
                    group.rotation.y += (e.clientX - prevMouse.x) * 0.01;
                    group.rotation.x += (e.clientY - prevMouse.y) * 0.01;
                    prevMouse = { x: e.clientX, y: e.clientY };
                };
                const onUp = () => { isDragging = false; };
                containerRef.current.addEventListener('pointerdown', onDown);
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);

                return () => {
                    cancelAnimationFrame(frameId);
                    if (containerRef.current && renderer.domElement) containerRef.current.removeChild(renderer.domElement);
                };
            }, [targetEdge, isSpinning]);

            return (
                <div className="relative w-full h-[350px] bg-slate-900/50 border border-slate-700 rounded-3xl overflow-hidden cursor-grab active:cursor-grabbing">
                    <div ref={containerRef} className="w-full h-full" />
                </div>
            );
        };

        // --- Three.js Folding Viewer ---
        const FoldingViewer = ({ foldPercent, isSpinning = true }) => {
            const containerRef = useRef(null);
            const groupRef = useRef(null);
            const facesRef = useRef([]);

            useEffect(() => {
                if (!containerRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(10, 10, 10);
                scene.add(pointLight);

                const group = new THREE.Group();
                scene.add(group);
                groupRef.current = group;

                const size = 3;
                const h = 4;
                const faces = [];

                // Helper to create a folding face
                const createFace = (w, h, color, label, parent = group, pos = [0, 0, 0], rot = [0, 0, 0], pivot = [0, 0, 0]) => {
                    const fGroup = new THREE.Group();
                    fGroup.position.set(...pos);
                    fGroup.rotation.set(...rot);
                    parent.add(fGroup);

                    const geom = new THREE.PlaneGeometry(w, h);
                    const mat = new THREE.MeshPhongMaterial({ color, side: THREE.DoubleSide, flatShading: true });
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.set(-pivot[0], -pivot[1], -pivot[2]);
                    fGroup.add(mesh);

                    // Border
                    const edges = new THREE.EdgesGeometry(geom);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x0f172a }));
                    line.position.copy(mesh.position);
                    fGroup.add(line);

                    return fGroup;
                };

                // Triangular Prism Net
                const angle = (foldPercent / 100) * (Math.PI * 2 / 3); // 120 degrees fold
                const capAngle = (foldPercent / 100) * (Math.PI / 2); // 90 degrees fold

                // Base (Center)
                const base = createFace(size, h, 0x14b8a6, "底面", group, [0, 0, 0], [0, 0, 0], [0, 0, 0]);

                // Left Side
                const left = createFace(size, h, 0x2dd4bf, "左側面", base, [-size / 2, 0, 0], [0, angle, 0], [-size / 2, 0, 0]);

                // Right Side
                const right = createFace(size, h, 0x2dd4bf, "右側面", base, [size / 2, 0, 0], [0, -angle, 0], [size / 2, 0, 0]);

                // Top Cap (Triangle)
                const triGeom = new THREE.BufferGeometry();
                const v = size * Math.sqrt(3) / 2;
                const vertices = new Float32Array([0, v, 0, -size / 2, 0, 0, size / 2, 0, 0]);
                triGeom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                triGeom.computeVertexNormals();

                const topCapGroup = new THREE.Group();
                topCapGroup.position.set(0, h / 2, 0);
                topCapGroup.rotation.x = -capAngle;
                base.add(topCapGroup);
                const topMesh = new THREE.Mesh(triGeom, new THREE.MeshPhongMaterial({ color: 0x0d9488, side: THREE.DoubleSide }));
                topCapGroup.add(topMesh);

                const botCapGroup = new THREE.Group();
                botCapGroup.position.set(0, -h / 2, 0);
                botCapGroup.rotation.x = capAngle;
                base.add(botCapGroup);
                const botMesh = new THREE.Mesh(triGeom, new THREE.MeshPhongMaterial({ color: 0x0d9488, side: THREE.DoubleSide }));
                botMesh.rotation.z = Math.PI;
                botCapGroup.add(botMesh);

                camera.position.set(6, 6, 8);
                camera.lookAt(0, 0, 0);

                let frameId;
                const animate = () => {
                    if (isSpinning) group.rotation.y += 0.005;
                    renderer.render(scene, camera);
                    frameId = requestAnimationFrame(animate);
                };
                animate();

                // Interactivity
                let isDragging = false;
                let prevMouse = { x: 0, y: 0 };
                const onDown = (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
                const onMove = (e) => {
                    if (!isDragging) return;
                    group.rotation.y += (e.clientX - prevMouse.x) * 0.01;
                    group.rotation.x += (e.clientY - prevMouse.y) * 0.01;
                    prevMouse = { x: e.clientX, y: e.clientY };
                };
                const onUp = () => { isDragging = false; };
                containerRef.current.addEventListener('pointerdown', onDown);
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);

                return () => {
                    cancelAnimationFrame(frameId);
                    if (containerRef.current && renderer.domElement) containerRef.current.removeChild(renderer.domElement);
                };
            }, [foldPercent, isSpinning]);

            return (
                <div className="relative w-full h-[400px] bg-slate-50 border-2 border-slate-200 rounded-3xl overflow-hidden cursor-grab active:cursor-grabbing">
                    <div ref={containerRef} className="w-full h-full" />
                </div>
            );
        };



        // 教學提示遮罩 (點擊顯示答案)
        const RevealHint = ({ question, answer }) => {
            const [revealed, setRevealed] = useState(false);
            return (
                <div className="my-4 border-2 border-dashed border-blue-200 rounded-xl overflow-hidden bg-blue-50/50">
                    <div className="p-4 font-bold text-slate-700 flex items-start gap-3">
                        <i className="fa-regular fa-circle-question text-blue-500 mt-1"></i>
                        <div>{question}</div>
                    </div>
                    <div className={`transition-all duration-300 ${revealed ? 'max-h-40 opacity-100 p-4 border-t border-blue-100 bg-white' : 'max-h-0 opacity-0 px-4'}`}>
                        <div className="font-black text-blue-700 flex items-start gap-3">
                            <i className="fa-solid fa-lightbulb text-amber-400 mt-1"></i>
                            <div>{answer}</div>
                        </div>
                    </div>
                    {!revealed && (
                        <button onClick={() => setRevealed(true)} className="w-full py-2 text-xs font-black text-blue-500 hover:bg-blue-100 transition-colors tracking-widest">
                            點擊顯示老師解析
                        </button>
                    )}
                </div>
            );
        };

        // --- Slides Content ---
        const slidesData = [
            { id: 'intro', title: '單元導入：認識立體圖形', icon: 'fa-box' },
            { id: 'skew', title: '空間中的線與面：歪斜關係', icon: 'fa-arrows-left-right' },
            { id: 'nets', title: '立體的展開與重組', icon: 'fa-expand' },
            { id: 'cross', title: '挑戰：截面謎題', icon: 'fa-scissors' },
            { id: 'euler', title: '表面積與歐拉定理', icon: 'fa-calculator' },
            { id: 'classify', title: '挑戰：圖形分類特訓', icon: 'fa-box-open' },
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [slideKey, setSlideKey] = useState(0); // 為了觸發轉場動畫

            // State for Slide 1 (Intro/Sweep)
            const [sweepSides, setSweepSides] = useState(3);
            const [sweepHeight, setSweepHeight] = useState(50);

            // State for Slide 2 (Skew)
            const [skewAnswer, setSkewAnswer] = useState(null);

            // State for Slide 3 (Nets)
            const [netType, setNetType] = useState('cube');
            const [foldPercent, setFoldPercent] = useState(0);

            // State for Slide 4 (Cross)
            const [crossSectionIdx, setCrossSectionIdx] = useState(0);
            const [guessShape, setGuessShape] = useState(null);

            // State for Slide 5 (Euler & Surface)
            const [surfaceType, setSurfaceType] = useState('prism');
            const [eulerShapeIdx, setEulerShapeIdx] = useState(0);
            const [surfaceInputs, setSurfaceInputs] = useState({ a: 5, h: 8, r: 3, l: 5 });

            // State for Slide 6 (Classify)
            const [score, setScore] = useState(0);
            const [classifyItems, setClassifyItems] = useState([]);
            const [currentClassifyIndex, setCurrentClassifyIndex] = useState(0);
            const [classifyFeedback, setClassifyFeedback] = useState(null);

            const initialClassifyItems = [
                { name: '埃及金字塔', correct: '角錐', explanation: '金字塔底部是正方形，側面匯聚成一個頂點，這是典型的「角錐」。', icon: <i className="fa-solid fa-caret-up text-6xl text-blue-500"></i> },
                { name: '六角鉛筆', correct: '角柱', explanation: '鉛筆的上下截面都是全等的六邊形且平行，側面是長方形，所以是「角柱」。', icon: <i className="fa-solid fa-pen text-6xl text-blue-500"></i> },
                { name: '乾電池', correct: '圓柱', explanation: '電池上下底面是全等的圓形，側面是一個圓滑曲面，這是「圓柱」。', icon: <i className="fa-solid fa-battery-full text-6xl text-blue-500"></i> },
                { name: '冰淇淋甜筒', correct: '圓錐', explanation: '甜筒頂部是圓形，側面向下匯聚成一點，這是「圓錐」。', icon: <i className="fa-solid fa-ice-cream text-6xl text-blue-500"></i> },
                { name: '魔術方塊', correct: '角柱', explanation: '立方體是一種特殊的正四角柱，每一面都是全等的正方形。', icon: <i className="fa-solid fa-cube text-6xl text-blue-500"></i> },
                { name: '交通錐', correct: '圓錐', explanation: '底面是圓形，側面向頂點逐漸收窄，是典型的「圓錐」。', icon: <i className="fa-solid fa-triangle-exclamation text-6xl text-blue-500"></i> },
                { name: '洋芋片罐', correct: '圓柱', explanation: '長長的圓桶型，上下底面是平行的全等圓，屬於「圓柱體」。', icon: <i className="fa-solid fa-box-archive text-6xl text-blue-500"></i> },
                { name: '露營帳篷', correct: '角柱', explanation: '這是一個橫放的三角柱，兩端是三角形，側面是長方形。', icon: <i className="fa-solid fa-campground text-6xl text-blue-500"></i> },
                { name: '骰子', correct: '角柱', explanation: '骰子每一面都是正方形，屬於角柱家族中的正方體。', icon: <i className="fa-solid fa-dice text-6xl text-blue-500"></i> },
                { name: '派對帽', correct: '圓錐', explanation: '底部是圓形開口，頂端收成一點，屬於「圓錐」。', icon: <i className="fa-solid fa-hat-wizard text-6xl text-blue-500"></i> },
                { name: '美味粽子', correct: '角錐', explanation: '粽子通常是三角錐（四面體）的形狀，有底面與匯聚的頂點。', icon: <i className="fa-solid fa-leaf text-6xl text-blue-500"></i> }
            ];

            useEffect(() => { shuffleItems(); }, []);
            const shuffleItems = () => { const s = [...initialClassifyItems].sort(() => Math.random() - 0.5); setClassifyItems(s); };

            const handleClassify = (cat) => {
                const item = classifyItems[currentClassifyIndex];
                if (classifyFeedback) return;
                const isCorrect = item.correct === cat;
                if (isCorrect) setScore(s => s + 10);
                setClassifyFeedback({ correct: isCorrect });
            };

            const nextClassify = () => {
                setClassifyFeedback(null);
                setCurrentClassifyIndex((prev) => (prev + 1) % classifyItems.length);
                if (currentClassifyIndex === classifyItems.length - 1) shuffleItems();
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentIndex]);

            const nextSlide = () => {
                if (currentIndex < slidesData.length - 1) {
                    setCurrentIndex(c => c + 1);
                    setSlideKey(k => k + 1);
                }
            };

            const prevSlide = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(c => c - 1);
                    setSlideKey(k => k + 1);
                }
            };

            // == Slide 1 Render ==
            const renderIntroSlide = () => {
                const points = [];
                for (let i = 0; i < sweepSides; i++) {
                    const angle = (i / sweepSides) * 2 * Math.PI - Math.PI / 2;
                    points.push(`${50 + 40 * Math.cos(angle)}% ${50 + 40 * Math.sin(angle)}%`);
                }
                const clipPath = `polygon(${points.join(', ')})`;

                return (
                    <div className="flex flex-col lg:flex-row h-full gap-8">
                        <div className="w-full lg:w-1/3 textbook-panel bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between overflow-y-auto">
                            <div>
                                <div className="inline-block bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-black tracking-widest mb-4">CH 3-1</div>
                                <h2 className="text-4xl font-black text-slate-800 mb-6 leading-tight">第一節<br />立體圖形的生成</h2>

                                <h3 className="text-xl font-bold text-blue-800 mt-8 mb-3 border-b-2 border-blue-100 pb-2">課本重點：什麼是柱體？</h3>
                                <p className="text-slate-600 leading-relaxed font-medium mb-6">
                                    在日常生活中，我們常見的六角鉛筆、罐頭等立體圖形。我們可以用「<span className="font-black text-orange-600">一個平面圖形沿著某個方向平移</span>」的概念來想像它們是如何產生的。這種方式在電腦繪圖中被稱為「<span className="underline decoration-orange-400 decoration-2">掃掠 (Sweep)</span>」。
                                </p>

                                <RevealHint
                                    question="如果將一個正多邊形的邊數不斷增加 (例如正 20 邊形)，它掃掠出來的立體圖形會接近什麼形狀？"
                                    answer="當正多邊形邊數接近無限大時，底面就趨近於「圓形」，此時掃掠出來的立體圖形就會變成「圓柱」！"
                                />
                            </div>

                            <div className="mt-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                <i className="fa-solid fa-chalkboard-user text-blue-400 text-3xl mb-3"></i>
                                <h4 className="font-black text-slate-700 mb-2">老師小提示</h4>
                                <p className="text-sm text-slate-500">上課時，可以請學生回想「堆疊一疊 10 元硬幣」，就是從 2D 的「圓」變成 3D 「圓柱」的過程喔！</p>
                            </div>
                        </div>

                        <div className="w-full lg:w-2/3 bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-orange-500/5 rounded-bl-full -z-10"></div>

                            <div className="w-full max-w-lg space-y-6 z-10">
                                <div className="bg-slate-900 text-white p-4 rounded-xl flex items-center justify-between shadow-lg">
                                    <div className="font-black"><i className="fa-solid fa-sliders text-orange-500 mr-2"></i> 互動參數儀</div>
                                    <div className="flex gap-4">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-slate-400">邊數 n</span>
                                            <input type="range" min="3" max="50" value={sweepSides} onChange={e => setSweepSides(parseInt(e.target.value))} className="w-24" />
                                            <span className="font-mono text-orange-400 w-6">{sweepSides}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-slate-400">距離 d</span>
                                            <input type="range" min="10" max="150" value={sweepHeight} onChange={e => setSweepHeight(parseInt(e.target.value))} className="w-24" />
                                            <span className="font-mono text-orange-400 w-6">{sweepHeight}</span>
                                        </div>
                                    </div>
                                </div>

                                <ThreeDViewer sides={sweepSides} height={sweepHeight} />
                            </div>
                        </div>
                    </div>
                );
            };

            // == Slide 2 Render ==
            const renderSkewSlide = () => (
                <div className="flex flex-col lg:flex-row h-full gap-8">
                    <div className="w-full lg:w-1/3 textbook-panel bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between overflow-y-auto">
                        <div>
                            <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">第二節<br />空間中的歪斜關係</h2>

                            <h3 className="text-xl font-bold text-emerald-700 mt-6 mb-3 border-b-2 border-emerald-100 pb-2">重要定義：歪斜 (Skew lines)</h3>
                            <div className="bg-emerald-50 p-5 rounded-xl border-l-4 border-emerald-500 mb-6">
                                <p className="text-emerald-900 font-bold mb-2">空間中兩條直線若同時滿足：</p>
                                <ol className="list-decimal ml-5 text-emerald-800 space-y-1 font-medium">
                                    <li><strong>不相交</strong> (無交點)</li>
                                    <li><strong>不平行</strong> (所在方向不一致)</li>
                                </ol>
                                <p className="text-sm mt-3 text-emerald-700">我們稱這兩條直線互為「<strong>歪斜線</strong>」。它們不可能位於同一個平面上喔！</p>
                            </div>

                            <RevealHint
                                question={<span>觀察右方的正方體，紅色顯示的是稜邊 <span className="overline font-serif italic font-bold mx-0.5">AB</span>。請問哪些邊與 <span className="overline font-serif italic font-bold mx-0.5">AB</span> 互為「歪斜線」？</span>}
                                answer={<span>只有 CG, DH, FG, EH 這四條邊與 <span className="overline font-serif italic font-bold mx-0.5">AB</span> 互為歪斜線（不平行且不相交）。您可以點擊右方的解題按鈕來驗證！</span>}
                            />
                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 bg-slate-900 p-8 rounded-2xl shadow-xl flex flex-col items-center justify-center text-white">
                        <h3 className="text-2xl font-black mb-8 text-emerald-400 tracking-widest uppercase">歪斜線 3D 空間檢查</h3>

                        <SkewViewer targetEdge={skewAnswer} />

                        <div className="mt-8 flex gap-4 w-full max-w-md">
                            <button onClick={() => setSkewAnswer('CG')} className={`flex-1 py-3 px-4 rounded-xl font-black transition-all ${skewAnswer === 'CG' ? 'bg-emerald-500 text-slate-900 shadow-[0_0_20px_rgba(16,185,129,0.4)]' : 'bg-slate-800 border border-slate-600 hover:bg-slate-700'}`}>測試 A：稜邊 CG {skewAnswer === 'CG' && '✅ 歪斜'}</button>
                            <button onClick={() => setSkewAnswer('BC')} className={`flex-1 py-3 px-4 rounded-xl font-black transition-all ${skewAnswer === 'BC' ? 'bg-red-500 text-white shadow-[0_0_20px_rgba(244,63,94,0.4)]' : 'bg-slate-800 border border-slate-600 hover:bg-slate-700'}`}>測試 B：稜邊 BC {skewAnswer === 'BC' && '❌ 相交於 B'}</button>
                        </div>
                    </div>
                </div>
            );

            // == Slide 3 Render (Nets) ==
            const renderNetsSlide = () => (
                <div className="flex flex-col lg:flex-row h-full gap-8">
                    <div className="w-full lg:w-1/3 textbook-panel bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between overflow-y-auto">
                        <div>
                            <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">第三節<br />立體的展開圖</h2>

                            <h3 className="text-lg font-bold text-teal-700 mt-6 mb-3 border-b-2 border-teal-100 pb-2">從平面到空間的想像力</h3>
                            <p className="text-slate-600 leading-relaxed font-medium mb-6">
                                將立體圖形沿著稜邊剪開，攤平在同一個平面上，所得的平滑圖形稱為「<strong>表面展開圖</strong>」。同一個立體圖形，若沿著不同的稜邊剪開，會得到不同形狀的展開圖。
                            </p>

                            <div className="bg-slate-100 p-6 rounded-xl text-center mb-6">
                                <p className="text-xs font-black uppercase text-slate-400 mb-2">請教師引導學生</p>
                                <p className="font-bold text-slate-700">利用右方的控制拉桿，觀察 2D 平面如何「摺疊」成 3D 立體。</p>
                            </div>
                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center relative">
                        <div className="w-full max-w-lg mb-6 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <div className="flex justify-between font-black text-xs text-slate-500 mb-4 uppercase tracking-widest">
                                <span>2D 平面 (展開)</span>
                                <span className="text-teal-600 font-mono">{foldPercent}% Folding</span>
                                <span>3D 實體 (成形)</span>
                            </div>
                            <input type="range" min="0" max="100" value={foldPercent} onChange={(e) => setFoldPercent(parseInt(e.target.value))} className="w-full" style={{ '--textbook-blue': '#0d9488' }} />
                        </div>

                        <FoldingViewer foldPercent={foldPercent} />
                    </div>
                </div>
            );

            // == Slide 6 Render (Classify) ==
            const renderClassifySlide = () => {
                const item = classifyItems[currentClassifyIndex];
                if (!item) return <div className="p-10 text-center font-black text-slate-400">載入中...</div>;
                return (
                    <div className="flex flex-col h-full gap-8 relative">
                        <div className="absolute -right-20 -top-20 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl"></div>
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center relative z-10 w-full mb-2">
                            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                                第六節：圖形分類特訓
                            </h2>
                            <div className="flex items-center gap-4 mt-4 md:mt-0">
                                <div className="bg-orange-50 px-4 py-2 rounded-xl border border-orange-100 text-center shadow-sm">
                                    <div className="text-[10px] font-black text-orange-400 uppercase tracking-widest">SCORE</div>
                                    <div className="text-2xl font-black text-orange-600">{score}</div>
                                </div>
                                <div className="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 text-center shadow-sm">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">PROGRESS</div>
                                    <div className="text-2xl font-black text-slate-800">{currentClassifyIndex + 1}/{classifyItems.length}</div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center">
                            <div className="bg-white rounded-[32px] p-12 mb-8 flex flex-col items-center border border-slate-200 shadow-md group transition-all hover:shadow-xl w-full max-w-lg">
                                <div className="transform group-hover:scale-110 transition-transform duration-500">{item.icon}</div>
                                <h3 className="text-2xl font-black text-slate-700 mt-6">{item.name}</h3>
                                <p className="text-blue-500 font-bold mt-2 bg-blue-50/50 px-4 py-1 rounded-full text-sm">請問這是哪種幾何體？</p>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 relative z-10 w-full max-w-2xl">
                                {['角柱', '角錐', '圓柱', '圓錐'].map(cat => (
                                    <button key={cat} onClick={() => handleClassify(cat)} disabled={!!classifyFeedback}
                                        className={`p-6 rounded-2xl border-2 font-black text-xl transition-all ${classifyFeedback ? (item.correct === cat ? 'bg-emerald-500 border-emerald-600 text-white shadow-lg scale-95' : 'bg-slate-100 border-slate-200 text-slate-300 opacity-50') : 'bg-white border-slate-200 text-slate-600 hover:border-blue-500 hover:bg-blue-50 hover:-translate-y-1 shadow-sm'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {classifyFeedback && (
                                <div className={`mt-8 p-8 rounded-3xl animate-slide-up border-2 w-full max-w-2xl ${classifyFeedback.correct ? 'bg-emerald-50 border-emerald-200 shadow-[0_0_40px_rgba(16,185,129,0.1)]' : 'bg-rose-50 border-rose-200 shadow-[0_0_40px_rgba(244,63,94,0.1)]'}`}>
                                    <div className="flex items-start gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center text-2xl shadow-sm shrink-0 ${classifyFeedback.correct ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                            <i className={`fa-solid ${classifyFeedback.correct ? 'fa-check' : 'fa-xmark'}`}></i>
                                        </div>
                                        <div className="flex-1">
                                            <h4 className="text-xl font-black text-slate-800 mb-1">{classifyFeedback.correct ? '太棒了，答對囉！' : '再想想看喔！'}</h4>
                                            <p className="text-slate-600 font-bold leading-relaxed">{item.explanation}</p>
                                            <button onClick={nextClassify}
                                                className="mt-6 bg-slate-800 text-white px-8 py-3 rounded-xl font-black hover:bg-slate-700 transition-all shadow-lg active:scale-95">下一個圖形</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // 簡單的路由切換
            const renderContent = () => {
                switch (slidesData[currentIndex].id) {
                    case 'intro': return renderIntroSlide();
                    case 'skew': return renderSkewSlide();
                    case 'nets': return renderNetsSlide();
                    case 'cross': return (
                        <div className="flex flex-col lg:flex-row h-full gap-8">
                            <div className="w-full lg:w-1/3 textbook-panel bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between overflow-y-auto">
                                <div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">第四節<br />截面謎題</h2>
                                    <p className="text-slate-600 leading-relaxed font-medium mb-6">
                                        當我們用一個平面去「切割」立體圖形時，在平面上留下的痕跡就稱為「<strong>截面</strong>」。相同的立體，若切割角度不同，截面的形狀也會不同。
                                    </p>
                                    <RevealHint
                                        question="用一個平面切割正方體，有可能切出「六邊形」嗎？"
                                        answer="答案是：有可能！只要切割平面同時經過正方體的六條稜邊。這是一個非常有意思的空間思維挑戰。"
                                    />
                                </div>
                            </div>
                            <div className="w-full lg:w-2/3 bg-slate-50 p-8 rounded-2xl flex flex-col items-center justify-center">
                                <div className="text-sm font-black text-slate-400 mb-4 uppercase tracking-widest italic">互動模組開發中：此處將展示切面變化</div>
                                <div className="w-64 h-64 border-4 border-dashed border-slate-300 rounded-3xl flex items-center justify-center">
                                    <i className="fa-solid fa-cube text-slate-300 text-8xl animate-pulse"></i>
                                </div>
                            </div>
                        </div>
                    );
                    case 'euler': return (
                        <div className="flex flex-col h-full gap-8">
                            <div className="textbook-panel bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                                <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">第五節：歐拉定理 (Euler's Theorem)</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-slate-900 rounded-2xl p-8 text-white">
                                        <div className="text-sky-400 font-black text-sm uppercase mb-4 tracking-tighter">核心公式</div>
                                        <div className="text-5xl font-black flex items-center gap-4 mb-6">
                                            <span>V</span><span className="text-slate-600">-</span><span>E</span><span className="text-slate-600">+</span><span>F</span><span className="text-slate-600">=</span><span className="text-orange-400">2</span>
                                        </div>
                                        <div className="space-y-2 text-slate-400 font-bold">
                                            <p>V (Vertices)：頂點數</p>
                                            <p>E (Edges)：稜邊數</p>
                                            <p>F (Faces)：面數</p>
                                        </div>
                                    </div>
                                    <div className="bg-white border-2 border-slate-100 rounded-2xl p-6">
                                        <h3 className="font-black text-slate-700 mb-4">為什麼一定要學歐拉定理？</h3>
                                        <p className="text-sm text-slate-500 leading-relaxed font-medium">
                                            歐拉定理揭示了凸多面體在拓撲結構上的不變性。無論是簡單的四面體，還是複雜的二十面體，只要是凸多面體，都遵循這個神奇的規律。這能幫助我們在遺漏數值時，快速推算出正確的答案。
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    case 'classify': return renderClassifySlide();
                    default: return null;
                }
            };

            return (
                <div className="h-screen w-screen flex flex-col bg-slate-50">
                    {/* Header Bar */}
                    <header className="bg-white border-b border-slate-200 h-16 shrink-0 px-6 flex items-center justify-between z-20 shadow-sm relative">
                        <div className="flex items-center gap-4">
                            <a href="index.html" className="group flex items-center gap-2 text-slate-400 hover:text-blue-600 transition-colors mr-2">
                                <div className="w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center group-hover:border-blue-200 group-hover:bg-blue-50 transition-all">
                                    <i className="fa-solid fa-arrow-left"></i>
                                </div>
                                <span className="text-xs font-black uppercase tracking-widest hidden sm:inline">返回首頁</span>
                            </a>
                            <div className="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-md">
                                <i className="fa-solid fa-book-open"></i>
                            </div>
                            <div>
                                <h1 className="font-black text-slate-800 leading-tight">單元 3-1 教學數位白板</h1>
                                <p className="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Interactive Textbook Mode</p>
                            </div>
                        </div>

                        {/* Progress Bubbles */}
                        <div className="flex gap-2">
                            {slidesData.map((s, i) => (
                                <div key={s.id} onClick={() => { setCurrentIndex(i); setSlideKey(k => k + 1); }}
                                    className={`h-2 rounded-full cursor-pointer transition-all ${currentIndex === i ? 'w-8 bg-blue-600' : 'w-2 bg-slate-300 hover:bg-slate-400'}`}>
                                </div>
                            ))}
                        </div>

                        <div className="flex items-center gap-3">
                            <span className="text-sm font-black text-slate-500 mr-2">{currentIndex + 1} / {slidesData.length}</span>
                            <button onClick={prevSlide} disabled={currentIndex === 0} className="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-slate-600 transition-colors"><i className="fa-solid fa-chevron-left"></i></button>
                            <button onClick={nextSlide} disabled={currentIndex === slidesData.length - 1} className="w-10 h-10 rounded-full bg-blue-600 hover:bg-blue-700 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-white transition-colors shadow-md"><i className="fa-solid fa-chevron-right"></i></button>
                        </div>

                        {/* Main Progress Bar (Absolute bottom of header) */}
                        <div className="absolute bottom-0 left-0 h-0.5 bg-blue-600 transition-all duration-300" style={{ width: `${((currentIndex + 1) / slidesData.length) * 100}%` }}></div>
                    </header>

                    {/* Slide Content Area */}
                    <main className="flex-1 p-6 lg:p-10 relative overflow-hidden">
                        <div key={slideKey} className="h-full w-full max-w-7xl mx-auto slide-enter">
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

    <script>
        const questions = [
            {
                id: 'q1', icon: '🏀', color: 'indigo',
                question: '「球體」沒有邊和角，那它會有三視圖嗎？',
                thinkFirst: '想一想：三視圖的本質是什麼？是「看形狀的邊角」，還是「看光線投影的輪廓」？',
                hints: [
                    { title: '提示 1：什麼是三視圖？', content: '三視圖的核心原理是「正投影」——想像一束平行光從某個方向照射物體，物體擋住光線所留下的「影子」就是視圖。所以，即使物體沒有稜角，只要它能擋光，就有三視圖。' },
                    { title: '提示 2：想像實驗', content: '在大太陽下拿一顆籃球放在地上，地面上的影子是什麼形狀？從正前方用手電筒照，牆上的影子呢？從側面照呢？' },
                    { title: '提示 3：對稱性的力量', content: '球體從上、前、右三個方向看，輪廓有什麼共同點？球體具有「完美球對稱性」，任何方向的投影都一樣。' }
                ],
                answer: '球體的三視圖均為<strong class="text-indigo-600">全等的圓</strong>，半徑等於球體半徑 $r$。三視圖看的不是「邊角」，而是「投影輪廓」。球體從任何方向看到的最寬剪影（大圓）都完全相同。',
                bonus: '生活連結：CT 掃描（電腦斷層）正是利用不同角度的「投影」來重建 3D 結構，原理與三視圖一脈相承！'
            },
            {
                id: 'q2', icon: '🍦', color: 'amber',
                question: '錐體的體積為何剛好是柱體的 ⅓？',
                thinkFirst: '想一想：如果你有一個空心的錐體和一個同底同高的空心柱體，用錐體裝水倒入柱體，需要幾次才能裝滿？',
                hints: [
                    { title: '提示 1：實驗法', content: '想像同底同高的圓柱容器和圓錐容器。用錐體裝滿水往柱體倒——你會發現剛好需要倒 <strong>3 次</strong> 才能裝滿柱體！這就是 ⅓ 的直覺來源。' },
                    { title: '提示 2：切割法的線索', content: '試試看：從正方體的「中心點」向 8 個頂點各連一條線，你能把正方體切成幾個完全相同的四角錐？每個錐體的底面是正方體的哪一面？' },
                    { title: '提示 3：推導關鍵', content: '正方體可被切成 <strong>6 個等體積的四角錐</strong>。每個錐體的底面 = 正方體一面，高 = 邊長的一半：$$\\text{底面} = s^2, \\quad h = \\frac{s}{2}, \\quad V_{\\text{錐}} = \\frac{s^3}{6}$$代入後，你能推出 $V = \\frac{1}{3}Ah$ 嗎？' }
                ],
                answer: '錐體體積公式：$$V_{\\text{錐}} = \\frac{1}{3}Ah$$透過正方體切割法，正方體可切成 6 個等錐：$$V_{cube} = s^3 \\;\\Rightarrow\\; V_{\\text{每個錐}} = \\frac{s^3}{6}$$因為每個錐的高等於邊長的一半（$s = 2h$），代入可得：$$\\frac{(2h)^2 \\cdot 2h}{6} = \\frac{1}{3} \\cdot s^2 \\cdot h = \\frac{1}{3}Ah$$',
                bonus: '延伸思考：球體體積公式裡也藏著三分之一喔！$$V_{\\text{球}} = \\frac{4}{3}\\pi r^3$$其實球可以想成無數個頂點在球心的微小錐體拼成的！'
            },
            {
                id: 'q3', icon: '🏫', color: 'emerald',
                question: '為何大多數學校的柱子要用「四角柱」而不是圓柱？',
                thinkFirst: '想一想：如果你是建築師，要在教室裡蓋一根柱子，你會考慮哪些因素？成本？空間？安全？',
                hints: [
                    { title: '提示 1：想想施工成本', content: '蓋柱子需要「模板」來灌漿。四角柱的模板是什麼形狀？圓柱的模板呢？哪一種比較容易做、成本比較低？' },
                    { title: '提示 2：想想空間利用', content: '教室是方形的，牆壁也是平面。一根四角柱靠在牆角 vs 一根圓柱靠在牆角，哪個會浪費空間（產生死角）？' },
                    { title: '提示 3：想想日常實用性', content: '學校的柱子上常常要掛什麼東西？（公佈欄、時鐘、滅火器架⋯⋯）這些東西的背面是什麼形狀？平面還是弧面？' }
                ],
                answer: '學校愛用四角柱有三大原因：<br>① <strong>施工成本低</strong>：只需 4 片平板模具，遠比圓柱的弧形模板便宜。<br>② <strong>空間零浪費</strong>：平面能與牆壁完美貼合，不產生弧形死角。<br>③ <strong>實用機能佳</strong>：平面方便安裝開關、公佈欄、掛架等。',
                bonus: '安全小知識：為避免直角碰撞，學校通常會在離地 1.5m 以下做「圓角處理」或裝防撞條。所以其實是「結合了圓柱優點的四角柱」！'
            },
            {
                id: 'q4', icon: '🔪', color: 'rose',
                question: '垂直於底面「縱截」圓柱，截面一定都是矩形嗎？',
                thinkFirst: '想一想：用一把刀「垂直地面」切一根柱子，刀面接觸到的邊界會是什麼線條？（上下兩邊？左右兩邊？）',
                hints: [
                    { title: '提示 1：分析截面的四條邊', content: '截面的上下兩邊 = 刀面與上下底面的交線。兩個平行圓被一條直線切過，會在圓上截出什麼？（弦或直徑）這兩條線彼此平行嗎？' },
                    { title: '提示 2：側邊呢？', content: '截面的左右兩邊 = 刀面與圓柱側面的交線。因為刀是「垂直於底面」的，這兩條線與底面的關係是？（垂直！）所以它們彼此是什麼關係？' },
                    { title: '提示 3：四個角度', content: '上下兩邊平行，左右兩邊也平行且垂直於底面。那麼四個交角各是幾度？滿足什麼四邊形的定義？' }
                ],
                answer: '是的！垂直底面縱截圓柱，截面<strong class="text-rose-600">一定是矩形</strong>。<br>上下兩邊 = 底面上的平行弦，左右兩邊 = 垂直側面上的平行直線，四角均為 $90°$。<br>特別的：若刀面恰過圓心，截面會是最大的矩形（寬 = 直徑）。',
                bonus: '延伸：如果刀面「不垂直」底面而是斜著切呢？截面會變成橢圓！因為圓被「拉伸」了。'
            },
            {
                id: 'q5', icon: '📐', color: 'violet',
                question: '三角柱被「平行底面」切開，截面是什麼形狀？跟錐體一樣嗎？',
                thinkFirst: '想一想：柱體的側面（從底到頂）是「平行且等長」的；錐體呢？這會導致截面有什麼不同？',
                hints: [
                    { title: '提示 1：柱體的特性', content: '柱體的定義：上下兩個全等底面，由平行且等長的側稜連接。如果平行底面切下去，截面的三個頂點各在哪三條側稜上？這三個點構成的三角形跟底面比，大小會變嗎？' },
                    { title: '提示 2：類比電梯', content: '想像底面三角形搭電梯往上升。電梯只做「平移」（不縮放、不旋轉）。在任何一層樓停下來——這一層的「切面」跟底面比，會是全等還是相似？' },
                    { title: '提示 3：跟錐體比較', content: '錐體的側稜全部交於一個頂點。越往頂點切，截面越小——所以是「相似（縮小版）」。柱體呢？側稜永遠平行，不縮小。你覺得截面跟底面的關係是？' }
                ],
                answer: '三角柱平行底面的截面 = 與底面<strong class="text-violet-600">完全全等</strong>的三角形。<br>因為柱體的側稜平行等長，截面等同底面的「平移複製品」，大小形狀完全不變。<br>而錐體的截面則是底面的「<strong>相似縮小版</strong>」，越接近頂點越小。',
                bonus: '關鍵口訣：「柱切全等，錐切相似」。這個規律對所有柱體和錐體都成立！'
            },
            {
                id: 'q6', icon: '💎', color: 'sky',
                question: '1000 元的三角錐 vs 500 元的四角柱（同底同高），誰比較「值錢」？',
                thinkFirst: '想一想：「值錢」有好幾種定義——總價、CP 值、材質珍貴度⋯⋯你會怎麼定義？',
                hints: [
                    { title: '提示 1：先算體積比', content: '同底同高條件下：$$V_{\\text{四角柱}} = Ah, \\quad V_{\\text{三角錐}} = \\frac{1}{3}Ah$$四角柱的體積是三角錐的幾倍？' },
                    { title: '提示 2：算「單位價值密度」', content: '三角錐：1000 元 ÷ 1 單位體積 = ?<br>四角柱：500 元 ÷ 3 單位體積 = ?<br>哪個的「每立方公分含金量」比較高？' },
                    { title: '提示 3：換個角度——當買家', content: '如果你是消費者，同樣花 500 元能買到 3 倍的空間；花 1000 元只買到 1 份空間。從 CP 值（性價比）來看，誰比較划算？' }
                ],
                answer: '答案取決於「值錢」的定義！<br>🏆 <strong>總標價</strong>：三角錐贏（1000 > 500）<br>💎 <strong>材質珍貴度</strong>：三角錐大勝（單位價值 1000 vs 167，差 6 倍！）<br>🛒 <strong>CP 值</strong>：四角柱勝（花更少錢買更多空間）<br>結論：三角錐是「<span class="text-amber-600 font-black">奢侈品</span>」，四角柱是「<span class="text-emerald-600 font-black">實用品</span>」。',
                bonus: '生活連結：鑽石很小卻很貴（高密度價值），大石頭很大卻便宜（高 CP 值）。體積與價值的關係，正是經濟學的核心概念！'
            },
            {
                id: 'q7', icon: '⚽', color: 'teal',
                question: '球體的體積公式是怎麼推導出來的？',
                thinkFirst: '想一想：如果把一顆球從上到下切成無數片薄薄的圓片，每一片圓片的半徑跟它在球上的「高度位置」有什麼關係？',
                hints: [
                    { title: '提示 1：把球切成薄片', content: '想像一顆半徑為 $r$ 的球，以球心為原點。在高度 $y$ 的位置水平切一刀，你會得到一個圓形截面。<br><br>問題：這個圓的半徑是多少？（提示：想想球的方程式 $x^2 + y^2 = r^2$，截面半徑就是 $x$）' },
                    { title: '提示 2：卡瓦列里原理的靈感', content: '古代數學家卡瓦列里（Cavalieri）發現了一個天才方法：如果兩個立體在「每一個高度」的截面積都相等，那它們的體積也一定相等。<br><br>所以問題變成了：有沒有一個「我們已經會算體積」的立體，它在每一層的截面積跟球一模一樣？' },
                    { title: '提示 3：圓柱挖掉圓錐！', content: '考慮一個半徑 $r$、高 $r$ 的圓柱，從裡面挖掉一個同底同高的圓錐。在高度 $y$ 處：<br><br>• 圓柱截面積 = $\\pi r^2$（固定）<br>• 圓錐截面積 = $\\pi y^2$（隨高度變大）<br>• 剩餘面積 = $\\pi(r^2 - y^2)$<br><br>而半球在高度 $y$ 的截面積恰好也是 $\\pi(r^2 - y^2)$！兩者在每一層都相等，所以體積也相等。' }
                ],
                answer: '利用<strong class="text-teal-600">卡瓦列里原理</strong>：半球的每一層截面積 = 「圓柱減圓錐」的截面積。在高度 $y$ 處，半球截面積為 $\\pi(r^2 - y^2)$。<br><br>而「半徑 $r$、高 $r$ 的圓柱」挖掉「同底同高圓錐」後的截面積也是 $\\pi(r^2 - y^2)$。兩者每一層都相等，所以體積也相等：$$V_{\\text{半球}} = V_{\\text{圓柱}} - V_{\\text{圓錐}} = \\pi r^2 \\cdot r - \\frac{1}{3}\\pi r^2 \\cdot r = \\frac{2}{3}\\pi r^3$$因此整顆球的體積：$$\\boxed{V_{\\text{球}} = 2 \\times \\frac{2}{3}\\pi r^3 = \\frac{4}{3}\\pi r^3}$$',
                bonus: '歷史故事：阿基米德（Archimedes）在兩千多年前就用類似的方法推導出球體體積，還要求在墓碑上刻一個「球內切於圓柱」的圖案來紀念這個發現！這代表圓柱與球的體積比恰好是 $3 : 2$。'
            }
        ];

        const colorMap = {
            indigo: { bg: 'bg-indigo-50', border: 'border-indigo-200', badge: 'bg-indigo-100 text-indigo-700', btn: 'bg-indigo-600 hover:bg-indigo-700', accent: 'text-indigo-600', ring: 'ring-indigo-200' },
            amber: { bg: 'bg-amber-50', border: 'border-amber-200', badge: 'bg-amber-100 text-amber-700', btn: 'bg-amber-600 hover:bg-amber-700', accent: 'text-amber-600', ring: 'ring-amber-200' },
            emerald: { bg: 'bg-emerald-50', border: 'border-emerald-200', badge: 'bg-emerald-100 text-emerald-700', btn: 'bg-emerald-600 hover:bg-emerald-700', accent: 'text-emerald-600', ring: 'ring-emerald-200' },
            rose: { bg: 'bg-rose-50', border: 'border-rose-200', badge: 'bg-rose-100 text-rose-700', btn: 'bg-rose-600 hover:bg-rose-700', accent: 'text-rose-600', ring: 'ring-rose-200' },
            violet: { bg: 'bg-violet-50', border: 'border-violet-200', badge: 'bg-violet-100 text-violet-700', btn: 'bg-violet-600 hover:bg-violet-700', accent: 'text-violet-600', ring: 'ring-violet-200' },
            sky: { bg: 'bg-sky-50', border: 'border-sky-200', badge: 'bg-sky-100 text-sky-700', btn: 'bg-sky-600 hover:bg-sky-700', accent: 'text-sky-600', ring: 'ring-sky-200' },
            teal: { bg: 'bg-teal-50', border: 'border-teal-200', badge: 'bg-teal-100 text-teal-700', btn: 'bg-teal-600 hover:bg-teal-700', accent: 'text-teal-600', ring: 'ring-teal-200' }
        };

        const state = {};
        questions.forEach(q => { state[q.id] = { hintsRevealed: 0, answerRevealed: false }; });

        function updateProgress() {
            const done = Object.values(state).filter(s => s.answerRevealed).length;
            document.getElementById('progressText').textContent = `${done} / ${questions.length} 題已完成`;
            document.getElementById('progressBar').style.width = `${(done / questions.length) * 100}%`;
        }

        function revealHint(qId, idx) {
            state[qId].hintsRevealed = Math.max(state[qId].hintsRevealed, idx + 1);
            const el = document.getElementById(`${qId}-hint-${idx}`);
            if (el) { el.classList.add('open'); }
            // Show next hint button or answer button
            const nextBtn = document.getElementById(`${qId}-hintBtn-${idx}`);
            if (nextBtn) nextBtn.style.display = 'none';
            const nextNext = document.getElementById(`${qId}-hintBtn-${idx + 1}`) || document.getElementById(`${qId}-answerBtn`);
            if (nextNext) { nextNext.style.display = 'inline-flex'; nextNext.classList.add('fade-in'); }
            if (typeof MathJax !== 'undefined' && MathJax.typeset) { setTimeout(() => MathJax.typeset(), 100); }
        }

        function revealAnswer(qId) {
            state[qId].answerRevealed = true;
            const el = document.getElementById(`${qId}-answer`);
            if (el) { el.classList.add('open'); }
            const btn = document.getElementById(`${qId}-answerBtn`);
            if (btn) btn.style.display = 'none';
            updateProgress();
            if (typeof MathJax !== 'undefined' && MathJax.typeset) { setTimeout(() => MathJax.typeset(), 100); }
        }

        function renderQuestions() {
            const app = document.getElementById('app');
            const progressEl = app.querySelector('.flex.items-center.gap-3');

            questions.forEach((q, qi) => {
                const c = colorMap[q.color];
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden';
                card.id = q.id;

                let hintsHtml = '';
                q.hints.forEach((h, hi) => {
                    hintsHtml += `
                        <div id="${q.id}-hint-${hi}" class="hint-reveal">
                            <div class="flex gap-3 items-start p-4 ${c.bg} rounded-xl border ${c.border} mt-3">
                                <span class="w-7 h-7 ${c.badge} rounded-lg flex items-center justify-center text-xs font-black shrink-0 mt-0.5">
                                    <i class="fa-solid fa-lightbulb"></i>
                                </span>
                                <div>
                                    <div class="font-bold text-slate-700 text-sm mb-1">${h.title}</div>
                                    <div class="text-sm text-slate-600 leading-relaxed">${h.content}</div>
                                </div>
                            </div>
                        </div>
                        <button id="${q.id}-hintBtn-${hi + 1}" onclick="revealHint('${q.id}', ${hi + 1})" style="display:none" class="mt-3 inline-flex items-center gap-2 ${c.btn} text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-sm transition-all hover:-translate-y-0.5">
                            <i class="fa-solid fa-lightbulb text-xs"></i> 再給我一個提示
                        </button>
                    `;
                });

                card.innerHTML = `
                    <div class="p-6 md:p-8">
                        <!-- Question Header -->
                        <div class="flex items-start gap-4 mb-5">
                            <div class="w-12 h-12 ${c.bg} border-2 ${c.border} rounded-2xl flex items-center justify-center text-2xl shrink-0">${q.icon}</div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1.5">
                                    <span class="${c.badge} text-[10px] font-black px-2 py-0.5 rounded-full uppercase">Question ${qi + 1}</span>
                                </div>
                                <h3 class="text-lg md:text-xl font-black text-slate-800 leading-snug">${q.question}</h3>
                            </div>
                        </div>

                        <!-- Think First Box -->
                        <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-5 mb-5">
                            <div class="flex items-center gap-2 mb-2">
                                <i class="fa-solid fa-brain ${c.accent}"></i>
                                <span class="font-black text-sm text-slate-700">先想一想 🤔</span>
                            </div>
                            <p class="text-sm text-slate-600 leading-relaxed font-medium">${q.thinkFirst}</p>
                        </div>

                        <!-- First Hint Button -->
                        <button id="${q.id}-hintBtn-0" onclick="revealHint('${q.id}', 0)" class="inline-flex items-center gap-2 ${c.btn} text-white text-sm font-bold px-5 py-2.5 rounded-xl shadow-sm transition-all hover:-translate-y-0.5">
                            <i class="fa-solid fa-key text-xs"></i> 我需要一點提示
                        </button>

                        <!-- Hints Container -->
                        <div class="space-y-0">
                            ${hintsHtml}
                        </div>

                        <!-- Answer Button -->
                        <button id="${q.id}-answerBtn" onclick="revealAnswer('${q.id}')" style="display:none" class="mt-4 inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold px-6 py-3 rounded-xl shadow-lg transition-all hover:-translate-y-0.5">
                            <i class="fa-solid fa-check-double text-xs"></i> 看看完整解答
                        </button>

                        <!-- Answer Reveal -->
                        <div id="${q.id}-answer" class="hint-reveal">
                            <div class="mt-5 bg-gradient-to-br from-slate-800 to-slate-900 text-white p-6 rounded-2xl relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                                <div class="flex items-center gap-2 mb-3">
                                    <i class="fa-solid fa-graduation-cap text-yellow-300"></i>
                                    <span class="font-black text-yellow-300 text-sm uppercase tracking-wider">完整解答</span>
                                </div>
                                <div class="text-sm leading-relaxed text-slate-200 relative z-10">${q.answer}</div>
                                <div class="mt-4 pt-4 border-t border-white/10">
                                    <div class="flex items-start gap-2">
                                        <i class="fa-solid fa-star text-yellow-400 text-xs mt-1"></i>
                                        <p class="text-xs text-slate-400 leading-relaxed"><strong class="text-slate-300">延伸思考：</strong>${q.bonus}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                app.appendChild(card);
            });

            // Animate cards
            document.querySelectorAll('#app > div.bg-white').forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 150 * i);
            });
        }

        renderQuestions();
    </script>
</body>

</html>
